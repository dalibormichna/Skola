<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investiční Lab Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.9);
            --accent: #0071e3;
            --text: #1d1d1f;
            --text-secondary: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 1100px; width: 100%; }

        header { text-align: center; margin: 40px 0; }
        h1 { font-size: 48px; font-weight: 700; letter-spacing: -0.015em; margin-bottom: 10px; }
        .subtitle { color: var(--text-secondary); font-size: 21px; font-weight: 400; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
        }

        h2 { font-size: 22px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .input-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-group { flex: 1; }
        
        label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d2d2d7;
            font-size: 16px;
            background: #fff;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .chart-container {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            position: relative;
        }

        .summary {
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .total-val { font-size: 24px; font-weight: 700; color: var(--accent); display: block; margin-top: 5px; }

        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Investiční Lab</h1>
        <p class="subtitle">Přehledné simulace vašich financí.</p>
    </header>

    <div class="grid">
        <div class="card">
            <h2>Jednoduché úročení</h2>
            <div class="input-row">
                <div class="input-group">
                    <label>Počáteční vklad</label>
                    <input type="number" id="s-init" value="100000" oninput="updateAll()">
                </div>
                <div class="input-group">
                    <label>Měsíční úložka</label>
                    <input type="number" id="s-monthly" value="2000" oninput="updateAll()">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Úrok (% p.a.)</label>
                    <input type="number" id="s-rate" value="5" oninput="updateAll()">
                </div>
                <div class="input-group">
                    <label>Roky</label>
                    <input type="number" id="s-years" value="10" oninput="updateAll()">
                </div>
            </div>
            <div class="summary">
                Budoucí hodnota:
                <span class="total-val" id="s-total">0 Kč</span>
            </div>
            <div class="chart-container">
                <canvas id="chartSimple"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Složené úročení</h2>
            <div class="input-row">
                <div class="input-group">
                    <label>Počáteční vklad</label>
                    <input type="number" id="c-init" value="100000" oninput="updateAll()">
                </div>
                <div class="input-group">
                    <label>Měsíční úložka</label>
                    <input type="number" id="c-monthly" value="2000" oninput="updateAll()">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Úrok (% p.a.)</label>
                    <input type="number" id="c-rate" value="5" oninput="updateAll()">
                </div>
                <div class="input-group">
                    <label>Roky</label>
                    <input type="number" id="c-years" value="10" oninput="updateAll()">
                </div>
            </div>
            <div class="summary">
                Budoucí hodnota:
                <span class="total-val" id="c-total" style="color: #34c759;">0 Kč</span>
            </div>
            <div class="chart-container">
                <canvas id="chartCompound"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Odhad státního důchodu</h2>
            <div class="input-group">
                <label>Hrubá měsíční mzda</label>
                <input type="number" id="p-salary" value="45000" oninput="updateAll()">
            </div>
            <div style="margin-top: 15px;" class="input-group">
                <label>Odpracované roky</label>
                <input type="number" id="p-years" value="40" oninput="updateAll()">
            </div>
            <div class="summary" style="margin-top: 40px;">
                Odhadovaný měsíční důchod:
                <span class="total-val" id="p-total" style="color: #ff9500;">0 Kč</span>
            </div>
            <div class="chart-container">
                <canvas id="chartPension"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let charts = {};

    function formatCZK(val) {
        return new Intl.NumberFormat('cs-CZ').format(Math.round(val)) + " Kč";
    }

    function createChart(id, labels, colors) {
        const ctx = document.getElementById(id).getContext('2d');
        return new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: [0, 0],
                    backgroundColor: colors,
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: {
                cutout: '70%',
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
            }
        });
    }

    function updateAll() {
        // --- JEDNODUCHÉ ÚROČENÍ ---
        const sInit = parseFloat(document.getElementById('s-init').value) || 0;
        const sMonth = parseFloat(document.getElementById('s-monthly').value) || 0;
        const sRate = (parseFloat(document.getElementById('s-rate').value) / 100) || 0;
        const sYears = parseFloat(document.getElementById('s-years').value) || 0;

        const sTotalVklady = sInit + (sMonth * 12 * sYears);
        // Úrok se počítá jen z vkladů, nepřidává se k základu pro další úročení
        const sUroky = (sInit * sRate * sYears) + (sMonth * 12 * sRate * (sYears * (sYears + 1) / 2) / sYears * (sYears/2)); 
        // Zjednodušený model pro lineární úrok z pravidelné úložky
        const sFinalUrok = (sInit * sRate * sYears) + (sMonth * 12 * sYears * sRate / 2);
        
        const sFinal = sTotalVklady + sFinalUrok;
        document.getElementById('s-total').innerText = formatCZK(sFinal);
        updateChart('chartSimple', [sTotalVklady, sFinalUrok]);

        // --- SLOŽENÉ ÚROČENÍ ---
        const cInit = parseFloat(document.getElementById('c-init').value) || 0;
        const cMonth = parseFloat(document.getElementById('c-monthly').value) || 0;
        const cRate = (parseFloat(document.getElementById('c-rate').value) / 100) / 12 || 0;
        const cMonths = (parseFloat(document.getElementById('c-years').value) || 0) * 12;

        const cFVInit = cInit * Math.pow(1 + cRate, cMonths);
        const cFVMonthly = cMonth * ((Math.pow(1 + cRate, cMonths) - 1) / cRate);
        const cFinal = cFVInit + (cRate > 0 ? cFVMonthly : cMonth * cMonths);
        const cVklady = cInit + (cMonth * cMonths);
        const cUroky = cFinal - cVklady;

        document.getElementById('c-total').innerText = formatCZK(cFinal);
        updateChart('chartCompound', [cVklady, cUroky]);

        // --- DŮCHOD ---
        const pSal = parseFloat(document.getElementById('p-salary').value) || 0;
        const pYears = parseFloat(document.getElementById('p-years').value) || 0;
        const zaklad = 4400;
        let vypZaklad = pSal <= 19346 ? pSal : 19346 + ((pSal - 19346) * 0.26);
        const procVymera = (vypZaklad * 0.015) * pYears;
        const pFinal = zaklad + procVymera;

        document.getElementById('p-total').innerText = formatCZK(pFinal);
        updateChart('chartPension', [zaklad, procVymera]);
    }

    function updateChart(id, data) {
        charts[id].data.datasets[0].data = data;
        charts[id].update();
    }

    // Inicializace grafů
    window.onload = () => {
        charts['chartSimple'] = createChart('chartSimple', ['Vklady', 'Zisk'], ['#d2d2d7', '#0071e3']);
        charts['chartCompound'] = createChart('chartCompound', ['Vklady', 'Zisk'], ['#d2d2d7', '#34c759']);
        charts['chartPension'] = createChart('chartPension', ['Základ', 'Zásluha'], ['#e5e5e7', '#ff9500']);
        updateAll();
    };
</script>

</body>
</html>
