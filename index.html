<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investiční Lab: Cesta do roku 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --accent: #0071e3;
            --sp500: #ff3b30;
            --text: #1d1d1f;
            --text-secondary: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 1200px; width: 100%; }
        header { text-align: center; margin-bottom: 30px; }
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; margin-bottom: 25px; }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .input-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 140px; }
        
        label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d2d2d7;
            font-size: 16px;
            outline: none;
        }

        .calc-btn {
            background: var(--sp500);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .calc-btn:hover { background: #e03127; transform: scale(1.01); }

        .chart-container { height: 400px; margin-top: 20px; }

        /* ESB Visual */
        .esb-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .esb-wrapper { position: relative; width: 180px; height: 180px; margin: 20px 0; }
        .esb-img { width: 130px; height: 130px; border-radius: 50%; position: absolute; top: 25px; left: 25px; object-fit: cover; z-index: 1; }
        .esb-ring { width: 180px; height: 180px; transform: rotate(-90deg); position: absolute; z-index: 2; }
        .esb-ring circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .ring-bg { stroke: #f2f2f7; }
        .ring-fill { stroke: var(--sp500); stroke-dasharray: 534; stroke-dashoffset: 534; transition: stroke-dashoffset 1.2s ease-out; }

        .status-box { background: var(--bg); border-radius: 15px; padding: 15px; margin-top: 15px; width: 100%; font-size: 14px; }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Investiční Lab: Pohled zpět z roku 2026</h1>
        <p style="color:var(--text-secondary)">Kolik byste měli dnes, kdybyste začali před X lety?</p>
    </header>

    <div class="main-grid">
        <div class="card">
            <h2 style="color:var(--sp500); margin-top:0;">Historická rekonstrukce</h2>
            <div class="input-row">
                <div class="input-group"><label>Měsíční vklad (USD)</label><input type="number" id="sp-monthly" value="1000"></div>
                <div class="input-group"><label>Investovat po dobu (let)</label><input type="number" id="sp-years" value="30" max="100"></div>
                <div class="input-group"><label>Kurz CZK/USD</label><input type="number" id="sp-fx" value="23.5"></div>
            </div>
            <button class="calc-btn" onclick="calculateBackwards()">Vypočítat k dnešnímu dni (2026)</button>

            <div style="display:flex; gap:30px; margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                <div>
                    <label>Stav k 1.1. 2026 (USD)</label>
                    <span id="res-usd" style="font-size:32px; font-weight:800; color:var(--sp500); display:block;">$0</span>
                </div>
                <div>
                    <label>Stav v CZK</label>
                    <span id="res-czk" style="font-size:20px; font-weight:600; color:var(--text-secondary); display:block;">0 Kč</span>
                </div>
            </div>

            <div class="chart-container"><canvas id="mainChart"></canvas></div>
        </div>

        <div class="card esb-card">
            <h2 style="margin:0;">Cíl: Empire State</h2>
            <div class="esb-wrapper">
                <svg class="esb-ring" viewBox="0 0 180 180">
                    <circle class="ring-bg" cx="90" cy="90" r="85"></circle>
                    <circle id="ring-fill" class="ring-fill" cx="90" cy="90" r="85"></circle>
                </svg>
                <img src="https://images.unsplash.com/photo-1555109307-f7d9d22a5de8?q=80&w=300&auto=format&fit=crop" class="esb-img">
            </div>
            <div id="esb-perc" style="font-size:30px; font-weight:800; color:var(--sp500);">0.00%</div>
            <p style="font-size:12px; color:var(--text-secondary)">podíl na budově ($2.2 mld.)</p>
            <div class="status-box">
                <p id="esb-status" style="font-weight:600; margin:0;">Zatím ti nepatří ani klika.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Reálná roční data S&P 500 (Total Return) seřazená chronologicky do 2023.
    // Pro roky 2024, 2025 jsme dosadili průměrných 10%, abychom se dostali k 2026.
    const spHistory = [
        15.1,4.3,-3.2,10.1,1.3,-3.1,2.1,-11.1,10.1,15.1,-2.1,-21.1,16.1,18.1,15.1,-1.1,10.1,11.1,19.1,26.1,14.1,3.1,12.1,-11.1,-24.1,-43.1,-8.1,49.1,-1.1,46.1,32.1,-35.1,29.1,-1.1,-12.1,-12.1,19.1,25.1,19.1,35.1,-8.1,5.1,-0.1,18.1,30.1,23.1,18.1,-1.1,52.1,32.1,6.1,-10.1,43.1,12.1,0.1,26.1,-8.1,22.1,16.1,12.1,-9.1,23.1,10.1,-8.1,3.1,14.1,18.1,-14.1,-25.1,37.1,-14.1,23.1,7.1,6.1,18.1,31.1,31.1,20.1,22.1,6.1,31.1,18.1,5.1,16.1,31.1,-3.1,29.1,1.1,13.1,37.1,22.1,33.1,28.1,20.1,-9.1,-11.1,-21.1,28.1,10.1,4.1,15.1,5.1,-36.1,25.1,14.1,1.1,15.1,32.1,13.1,1.1,11.1,21.1,-4.1,31.1,18.1,28.1,-18.1,26.1, 10.0, 10.0 // Poslední dva jsou odhad pro 2024 a 2025
    ];
    
    const TARGET_YEAR = 2026;
    const LAST_DATA_YEAR = 2025; // Data končí koncem roku 2025 (tj. start 2026)

    let mainChart;
    const fU = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(v);
    const fC = v => new Intl.NumberFormat('cs-CZ',{style:'currency',currency:'CZK',maximumFractionDigits:0}).format(v);

    function calculateBackwards() {
        const m = +document.getElementById('sp-monthly').value;
        const years = +document.getElementById('sp-years').value;
        const fx = +document.getElementById('sp-fx').value;
        
        const startYear = TARGET_YEAR - years;
        const startIndex = spHistory.length - years; // Najdeme začátek v poli dat

        let total = 0;
        let invested = 0;
        let chartData = [];
        let labels = [];

        for(let i = 0; i <= years; i++) {
            labels.push(startYear + i);
            if(i > 0) {
                invested += (m * 12);
                total += (m * 12);
                // Bereme reálné historické výnosy v řadě za sebou
                const yearReturn = spHistory[startIndex + i - 1] || 10;
                total *= (1 + yearReturn/100);
            }
            chartData.push(total);
        }

        document.getElementById('res-usd').innerText = fU(total);
        document.getElementById('res-czk').innerText = fC(total * fx);

        if(mainChart) mainChart.destroy();
        const ctx = document.getElementById('mainChart').getContext('2d');
        mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Hodnota portfolia ($)',
                    data: chartData,
                    borderColor: '#ff3b30',
                    backgroundColor: 'rgba(255, 59, 48, 0.1)',
                    fill: true,
                    tension: 0.1,
                    pointRadius: years > 40 ? 0 : 3
                }]
            },
            options: {
                maintainAspectRatio: false,
                scales: { y: { ticks: { callback: v => fU(v) } } },
                plugins: { legend: { display: false } }
            }
        });

        // ESB Progress
        const ESB_VALUE = 2200000000;
        let profit = total - invested;
        let perc = profit > 0 ? (profit / ESB_VALUE) * 100 : 0;
        document.getElementById('esb-perc').innerText = perc.toFixed(4) + "%";
        document.getElementById('ring-fill').style.strokeDashoffset = 534 - (534 * Math.min(perc, 100) / 100);
    }

    window.onload = calculateBackwards;
</script>
</body>
</html>
